openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Çoklu Firma Muhasebe ve Cari Takip Paneli API
servers:
  - url: /api
    description: API temel yolu
tags:
  - name: health
    description: Sağlık kontrolü
  - name: firmalar
    description: Firma yönetimi (çatı ve bağlı firmalar)
  - name: gemiler
    description: Gemi yönetimi
  - name: banka-hesaplari
    description: Banka hesabı yönetimi
  - name: faturalar
    description: Fatura yönetimi
  - name: odemeler
    description: Ödeme ve tahsilat yönetimi
  - name: ekipmanlar
    description: Ekipman yönetimi
  - name: kdv-oranlari
    description: KDV oranı yönetimi
  - name: fatura-serileri
    description: Fatura serisi yönetimi
  - name: dashboard
    description: Dashboard özet verileri
  - name: raporlar
    description: Raporlama ve dışa aktarma

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Sağlık kontrolü
      responses:
        "200":
          description: Sağlıklı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Firmalar ──────────────────────────────────────────────────────────────
  /firmalar:
    get:
      operationId: listFirmalar
      tags: [firmalar]
      summary: Firmaları listele
      parameters:
        - name: tip
          in: query
          schema:
            type: string
            enum: [cati, bagli]
        - name: ustFirmaId
          in: query
          schema:
            type: integer
        - name: arama
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Firma listesi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Firma"
    post:
      operationId: createFirma
      tags: [firmalar]
      summary: Yeni firma oluştur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FirmaInput"
      responses:
        "201":
          description: Oluşturuldu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Firma"

  /firmalar/{id}:
    get:
      operationId: getFirma
      tags: [firmalar]
      summary: Firmayı getir
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Firma
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FirmaDetay"
    patch:
      operationId: updateFirma
      tags: [firmalar]
      summary: Firmayı güncelle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FirmaUpdate"
      responses:
        "200":
          description: Güncellendi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Firma"
    delete:
      operationId: deleteFirma
      tags: [firmalar]
      summary: Firmayı sil
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Silindi

  /firmalar/{id}/ekstre:
    get:
      operationId: getFirmaEkstre
      tags: [firmalar]
      summary: Firma ekstre (bağlı firmalar için)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Firma ekstre
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FirmaEkstre"

  /firmalar/{id}/eposta-ayarlari:
    get:
      operationId: getFirmaEpostaAyarlari
      tags: [firmalar]
      summary: Firma e-posta ayarlarını getir (çatı firmalar)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: E-posta ayarları
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FirmaEpostaAyarlari"
    put:
      operationId: upsertFirmaEpostaAyarlari
      tags: [firmalar]
      summary: Firma e-posta ayarlarını kaydet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FirmaEpostaAyarlariInput"
      responses:
        "200":
          description: Kaydedildi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FirmaEpostaAyarlari"

  # ── Gemiler ────────────────────────────────────────────────────────────────
  /gemiler:
    get:
      operationId: listGemiler
      tags: [gemiler]
      summary: Gemileri listele
      parameters:
        - name: firmaId
          in: query
          schema:
            type: integer
        - name: catiFirmaId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Gemi listesi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Gemi"
    post:
      operationId: createGemi
      tags: [gemiler]
      summary: Yeni gemi oluştur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GemiInput"
      responses:
        "201":
          description: Oluşturuldu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gemi"

  /gemiler/{id}:
    get:
      operationId: getGemi
      tags: [gemiler]
      summary: Gemiyi getir
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Gemi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GemiDetay"
    patch:
      operationId: updateGemi
      tags: [gemiler]
      summary: Gemiyi güncelle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GemiUpdate"
      responses:
        "200":
          description: Güncellendi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Gemi"
    delete:
      operationId: deleteGemi
      tags: [gemiler]
      summary: Gemiyi sil
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Silindi

  # ── Banka Hesapları ────────────────────────────────────────────────────────
  /banka-hesaplari:
    get:
      operationId: listBankaHesaplari
      tags: [banka-hesaplari]
      summary: Banka hesaplarını listele
      parameters:
        - name: catiFirmaId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Banka hesabı listesi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/BankaHesabi"
    post:
      operationId: createBankaHesabi
      tags: [banka-hesaplari]
      summary: Yeni banka hesabı oluştur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BankaHesabiInput"
      responses:
        "201":
          description: Oluşturuldu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankaHesabi"

  /banka-hesaplari/{id}:
    get:
      operationId: getBankaHesabi
      tags: [banka-hesaplari]
      summary: Banka hesabını getir
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Banka hesabı
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankaHesabi"
    patch:
      operationId: updateBankaHesabi
      tags: [banka-hesaplari]
      summary: Banka hesabını güncelle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BankaHesabiUpdate"
      responses:
        "200":
          description: Güncellendi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankaHesabi"
    delete:
      operationId: deleteBankaHesabi
      tags: [banka-hesaplari]
      summary: Banka hesabını sil
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Silindi

  /banka-hesaplari/{id}/hareketler:
    get:
      operationId: getBankaHesabiHareketleri
      tags: [banka-hesaplari]
      summary: Banka hesabı hareketleri
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Hareketler
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BankaHareketleri"

  # ── Faturalar ──────────────────────────────────────────────────────────────
  /faturalar:
    get:
      operationId: listFaturalar
      tags: [faturalar]
      summary: Faturaları listele
      parameters:
        - name: catiFirmaId
          in: query
          schema:
            type: integer
        - name: bagliFirmaId
          in: query
          schema:
            type: integer
        - name: durum
          in: query
          schema:
            type: string
        - name: paraBirimi
          in: query
          schema:
            type: string
        - name: baslangicTarihi
          in: query
          schema:
            type: string
            format: date
        - name: bitisTarihi
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Fatura listesi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Fatura"
    post:
      operationId: createFatura
      tags: [faturalar]
      summary: Yeni fatura oluştur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FaturaInput"
      responses:
        "201":
          description: Oluşturuldu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fatura"

  /faturalar/{id}:
    get:
      operationId: getFatura
      tags: [faturalar]
      summary: Faturayı getir
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Fatura
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FaturaDetay"
    patch:
      operationId: updateFatura
      tags: [faturalar]
      summary: Faturayı güncelle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FaturaUpdate"
      responses:
        "200":
          description: Güncellendi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Fatura"
    delete:
      operationId: deleteFatura
      tags: [faturalar]
      summary: Faturayı sil
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Silindi

  # ── Ödemeler ───────────────────────────────────────────────────────────────
  /odemeler:
    get:
      operationId: listOdemeler
      tags: [odemeler]
      summary: Ödemeleri listele
      parameters:
        - name: catiFirmaId
          in: query
          schema:
            type: integer
        - name: bagliFirmaId
          in: query
          schema:
            type: integer
        - name: faturaId
          in: query
          schema:
            type: integer
        - name: tip
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Ödeme listesi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Odeme"
    post:
      operationId: createOdeme
      tags: [odemeler]
      summary: Yeni ödeme/tahsilat oluştur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OdemeInput"
      responses:
        "201":
          description: Oluşturuldu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Odeme"

  /odemeler/{id}:
    get:
      operationId: getOdeme
      tags: [odemeler]
      summary: Ödemeyi getir
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ödeme
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Odeme"
    patch:
      operationId: updateOdeme
      tags: [odemeler]
      summary: Ödemeyi güncelle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OdemeUpdate"
      responses:
        "200":
          description: Güncellendi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Odeme"
    delete:
      operationId: deleteOdeme
      tags: [odemeler]
      summary: Ödemeyi sil
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Silindi

  # ── Ekipmanlar ─────────────────────────────────────────────────────────────
  /ekipmanlar:
    get:
      operationId: listEkipmanlar
      tags: [ekipmanlar]
      summary: Ekipmanları listele
      parameters:
        - name: catiFirmaId
          in: query
          schema:
            type: integer
        - name: gemiId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Ekipman listesi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ekipman"
    post:
      operationId: createEkipman
      tags: [ekipmanlar]
      summary: Yeni ekipman oluştur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EkipmanInput"
      responses:
        "201":
          description: Oluşturuldu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ekipman"

  /ekipmanlar/{id}:
    patch:
      operationId: updateEkipman
      tags: [ekipmanlar]
      summary: Ekipmanı güncelle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EkipmanUpdate"
      responses:
        "200":
          description: Güncellendi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ekipman"
    delete:
      operationId: deleteEkipman
      tags: [ekipmanlar]
      summary: Ekipmanı sil
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Silindi

  # ── KDV Oranları ───────────────────────────────────────────────────────────
  /kdv-oranlari:
    get:
      operationId: listKdvOranlari
      tags: [kdv-oranlari]
      summary: KDV oranlarını listele
      parameters:
        - name: catiFirmaId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: KDV oranı listesi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/KdvOrani"
    post:
      operationId: createKdvOrani
      tags: [kdv-oranlari]
      summary: Yeni KDV oranı oluştur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KdvOraniInput"
      responses:
        "201":
          description: Oluşturuldu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KdvOrani"

  /kdv-oranlari/{id}:
    patch:
      operationId: updateKdvOrani
      tags: [kdv-oranlari]
      summary: KDV oranını güncelle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KdvOraniUpdate"
      responses:
        "200":
          description: Güncellendi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KdvOrani"
    delete:
      operationId: deleteKdvOrani
      tags: [kdv-oranlari]
      summary: KDV oranını sil
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Silindi

  # ── Fatura Serileri ────────────────────────────────────────────────────────
  /fatura-serileri:
    get:
      operationId: listFaturaSerileri
      tags: [fatura-serileri]
      summary: Fatura serilerini listele
      parameters:
        - name: catiFirmaId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Fatura serisi listesi
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FaturaSeri"
    post:
      operationId: createFaturaSeri
      tags: [fatura-serileri]
      summary: Yeni fatura serisi oluştur
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FaturaSeriInput"
      responses:
        "201":
          description: Oluşturuldu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FaturaSeri"

  /fatura-serileri/{id}:
    patch:
      operationId: updateFaturaSeri
      tags: [fatura-serileri]
      summary: Fatura serisini güncelle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FaturaSeriUpdate"
      responses:
        "200":
          description: Güncellendi
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FaturaSeri"
    delete:
      operationId: deleteFaturaSeri
      tags: [fatura-serileri]
      summary: Fatura serisini sil
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Silindi

  # ── Dashboard ──────────────────────────────────────────────────────────────
  /dashboard/ozet:
    get:
      operationId: getDashboardOzet
      tags: [dashboard]
      summary: Dashboard özet verileri
      parameters:
        - name: catiFirmaId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Özet veriler
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardOzet"

  /dashboard/vadesi-yaklasan:
    get:
      operationId: getVadesiYaklasanFaturalar
      tags: [dashboard]
      summary: Vadesi yaklaşan faturalar
      parameters:
        - name: catiFirmaId
          in: query
          schema:
            type: ["integer", "null"]
        - name: gun
          in: query
          schema:
            type: integer
            default: 30
      responses:
        "200":
          description: Vadesi yaklaşan faturalar
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Fatura"

  /dashboard/son-islemler:
    get:
      operationId: getSonIslemler
      tags: [dashboard]
      summary: Son işlemler
      parameters:
        - name: catiFirmaId
          in: query
          schema:
            type: ["integer", "null"]
        - name: limit
          in: query
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Son işlemler
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SonIslemler"

  /dashboard/aylik-gelir:
    get:
      operationId: getAylikGelir
      tags: [dashboard]
      summary: Aylık gelir grafik verisi
      parameters:
        - name: catiFirmaId
          in: query
          schema:
            type: ["integer", "null"]
        - name: yil
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Aylık gelir
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AylikGelirNoktasi"

  # ── Raporlar ───────────────────────────────────────────────────────────────
  /raporlar/kdv-ozeti:
    get:
      operationId: getKdvOzeti
      tags: [raporlar]
      summary: KDV özet raporu
      parameters:
        - name: catiFirmaId
          in: query
          schema:
            type: ["integer", "null"]
        - name: yil
          in: query
          schema:
            type: integer
        - name: ay
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: KDV özeti
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KdvOzeti"

  /raporlar/alacak-yaslandirma:
    get:
      operationId: getAlacakYaslandirma
      tags: [raporlar]
      summary: Alacak yaşlandırma raporu
      parameters:
        - name: catiFirmaId
          in: query
          schema:
            type: ["integer", "null"]
      responses:
        "200":
          description: Yaşlandırma raporu
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AlacakYaslandirma"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── Firma ────────────────────────────────────────────────────────────────
    Firma:
      type: object
      required: [id, tip, ad, olusturmaTarihi]
      properties:
        id:
          type: integer
        tip:
          type: string
          enum: [cati, bagli]
        ustFirmaId:
          type: ["integer", "null"]
        ad:
          type: string
        vergiNo:
          type: ["string", "null"]
        vergiDairesi:
          type: ["string", "null"]
        adres:
          type: ["string", "null"]
        telefon:
          type: ["string", "null"]
        eposta:
